<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
  }
  .gallery {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    touch-action: pan-y;
    user-select: none;
  }
  .img-wrap {
    width: 853px;
    max-width: 92vw;
    aspect-ratio: 853 / 1844;
    max-height: 92vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.85);
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 10;
    transition: background 0.2s;
  }
  .nav-btn:hover {
    background: rgba(255, 255, 255, 1);
  }
  .nav-btn svg {
    width: 22px;
    height: 22px;
  }
  .nav-left { left: 16px; }
  .nav-right { right: 16px; }
</style>
</head>
<body>

<div class="gallery" id="gallery">
  <button class="nav-btn nav-left" id="prevBtn" aria-label="Anterior">
    <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>

  <div class="img-wrap">
    <img id="galleryImg" src="img1.PNG" alt="">
  </div>

  <button class="nav-btn nav-right" id="nextBtn" aria-label="Următor">
    <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>
</div>

<script>
  // Fișierele img1.PNG, img2.PNG trebuie să fie în ACEEAȘI folder cu index.html (fără subfolder).
  // Ca să adaugi o poză nouă: mai adaugi o linie, cu virgulă după fiecare, în afară de ultima.
  const images = [
    "img1.PNG",
    "img2.PNG",
  "img3.PNG",
    "img4.PNG"
  ];

  let current = 0;
  const imgEl = document.getElementById('galleryImg');
  const gallery = document.getElementById('gallery');

  function showImage(index) {
    current = (index + images.length) % images.length;
    imgEl.src = images[current];
  }

  document.getElementById('prevBtn').addEventListener('click', () => showImage(current - 1));
  document.getElementById('nextBtn').addEventListener('click', () => showImage(current + 1));

  // Swipe support
  let touchStartX = 0;
  let touchEndX = 0;

  gallery.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  gallery.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  }, { passive: true });

  function handleSwipe() {
    const diff = touchEndX - touchStartX;
    const threshold = 50;
    if (diff > threshold) {
      showImage(current - 1);
    } else if (diff < -threshold) {
      showImage(current + 1);
    }
  }

  // Keyboard support (opțional, util pe desktop)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') showImage(current - 1);
    if (e.key === 'ArrowRight') showImage(current + 1);
  });
</script>

</body>
</html>
