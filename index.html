<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:white;
    overflow:hidden;
}

.gallery{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.gallery img{
    max-width:95vw;
    max-height:95vh;
    object-fit:contain;
}

button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    font-size:24px;
}

#prev{
    left:20px;
}

#next{
    right:20px;
}
</style>

</head>
<body>

<div class="gallery">

<button id="prev">&#10094;</button>

<img id="img" src="img1.png">

<button id="next">&#10095;</button>

</div>

<script>

const images=[
    "img1.png",
    "img2.png"
];

let current=0;

const img=document.getElementById("img");

function show(i){

    current=(i+images.length)%images.length;

    img.src=images[current];

}

document.getElementById("prev").onclick=()=>show(current-1);

document.getElementById("next").onclick=()=>show(current+1);

let startX=0;

document.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{

    let endX=e.changedTouches[0].clientX;

    if(endX-startX>50) show(current-1);

    if(startX-endX>50) show(current+1);

});

img.onerror=()=>{
    console.log("Nu găsesc imaginea:",img.src);
};

</script>

</body>
</html>
